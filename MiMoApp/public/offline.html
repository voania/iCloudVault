<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momento 相册 - 离线模式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #6750A4 0%, #4F378B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: #1C1B1F;
      border-radius: 24px;
      padding: 48px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #E6E1E5;
      margin-bottom: 12px;
    }
    
    .message {
      font-size: 14px;
      color: #CAC4D0;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: #6750A4;
      color: #FFFFFF;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .button:hover {
      background: #7A5FA0;
      transform: translateY(-1px);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button-icon {
      font-size: 18px;
    }
    
    .offline-features {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #49454F;
    }
    
    .offline-features h3 {
      font-size: 14px;
      font-weight: 600;
      color: #E6E1E5;
      margin-bottom: 16px;
    }
    
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #2B2930;
      border-radius: 12px;
    }
    
    .feature-icon {
      font-size: 20px;
    }
    
    .feature-text {
      font-size: 14px;
      color: #CAC4D0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📴</div>
    <h1 class="title">您当前处于离线状态</h1>
    <p class="message">
      网络连接暂时不可用，但您仍然可以查看和管理已缓存的照片。
      当网络恢复后，所有更改将自动同步。
    </p>
    
    <button class="button" onclick="checkConnection()">
      <span class="button-icon">🔄</span>
      重试连接
    </button>
    
    <div class="offline-features">
      <h3>离线可用功能</h3>
      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-icon">📷</span>
          <span class="feature-text">查看已缓存的照片</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">❤️</span>
          <span class="feature-text">管理收藏相册</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">📁</span>
          <span class="feature-text">浏览相册分类</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✏️</span>
          <span class="feature-text">编辑照片信息</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function checkConnection() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        setTimeout(checkConnection, 3000);
      }
    }

    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
