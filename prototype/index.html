<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>iCloudVault</title>
<style>
:root {
  --accent: #bb86fc;
  --accent-22: #bb86fc22;
  --accent-33: #bb86fc33;
  --accent-44: #bb86fc44;
  --accent-66: #bb86fc66;
  --accent-88: #bb86fc88;
  --accent-rgb: 187, 134, 252;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
  background:#0f0f0f; color:#fff; height:100vh; display:flex; flex-direction:column;
  overflow:hidden; user-select:none; -webkit-user-select:none;
}

/* ── Header ── */
.header { background:#1a1a2e; padding:12px 16px; display:flex; align-items:center; gap:10px; }
.logo-icon { fill:var(--accent); }
.logo-icon path { stroke:var(--accent); }
.header .badge { margin-left:auto; font-size:11px; background:var(--accent-22); color:var(--accent); padding:4px 10px; border-radius:12px; }
.header-actions { display:flex; gap:6px; margin-left:6px; }
.header-btn { background:#1e1e2e; border:1px solid #333; color:#aaa; font-size:11px; padding:5px 10px; border-radius:14px; cursor:pointer; display:flex; align-items:center; gap:4px; transition:all 0.2s; }
.header-btn:active { background:var(--accent-33); color:var(--accent); }

/* ── Select Mode Bar ── */
.select-bar { display:none; background:var(--accent); color:#000; padding:8px 16px; align-items:center; gap:12px; font-size:14px; }
.select-bar.show { display:flex; }
.select-bar .sel-count { font-weight:600; }
.select-bar button { background:#00000022; border:none; color:#000; padding:6px 14px; border-radius:14px; font-size:13px; cursor:pointer; }
.select-bar .sel-cancel { margin-left:auto; background:#00000033; }

/* ── Tabs ── */
.tabs { display:flex; gap:6px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:8px 20px; border-radius:20px; border:1px solid #333; background:transparent; color:#aaa; font-size:13px; white-space:nowrap; cursor:pointer; transition:all 0.2s; }
.tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:500; }

/* ── Stats ── */
.stats { padding:0 16px 10px; display:flex; gap:6px; align-items:center; font-size:12px; color:#888; flex-wrap:wrap; }
.stats .count { color:#fff; font-weight:500; }

/* ── Search ── */
.search-bar { margin:0 16px 8px; display:flex; gap:8px; position:relative; }
.search-bar input { flex:1; padding:10px 16px; border-radius:24px; border:none; background:#1e1e2e; color:#fff; font-size:14px; outline:none; }
.search-bar input::placeholder { color:#555; }
.search-clear { display:none; background:none; border:none; color:#888; font-size:18px; cursor:pointer; padding:0 8px; }
/* Semantic interpretation chips */
.semantic-chips { display:none; margin:4px 16px 8px; gap:6px; flex-wrap:wrap; align-items:center; }
.semantic-chips.show { display:flex; }
.sem-chip { padding:3px 10px; border-radius:12px; font-size:11px; display:flex; align-items:center; gap:4px; animation:fadeIn 0.2s ease; }
.sem-chip.time { background:#4caf5022; color:#4caf50; border:1px solid #4caf5044; }
.sem-chip.location { background:#2196f322; color:#2196f3; border:1px solid #2196f344; }
.sem-chip.content { background:#ff980022; color:#ff9800; border:1px solid #ff980044; }
.sem-chip.action { background:var(--accent-22); color:var(--accent); border:1px solid var(--accent-44); }
.sem-ai-badge { font-size:10px; color:var(--accent); display:flex; align-items:center; gap:2px; }

/* ── Photo Grid ── */
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; padding:0 3px; overflow-y:auto; flex:1; align-content:start; }
.photo-grid::-webkit-scrollbar { width:3px; }
.photo-grid::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
.photo-card { aspect-ratio:1; border-radius:3px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; transition:transform 0.15s, opacity 0.3s; animation: fadeIn 0.3s ease both; }
.photo-card:active { transform:scale(0.95); }
.photo-card.hidden { display:none; }
.photo-card.selected { outline:3px solid var(--accent); outline-offset:-3px; }
.photo-card .emoji { font-size:44px; transition:transform 0.3s; }
.photo-card .tag-badge { position:absolute; bottom:4px; right:4px; font-size:10px; background:#000000aa; color:#ccc; padding:2px 6px; border-radius:8px; }
.photo-card .ai-dot { position:absolute; top:4px; left:4px; width:8px; height:8px; border-radius:50%; background:var(--accent); display:none; box-shadow:0 0 6px var(--accent); }
.photo-card.ai-tagged .ai-dot { display:block; }
.photo-card .check-mark { display:none; position:absolute; top:6px; right:6px; width:22px; height:22px; border-radius:50%; color:#000; font-size:13px; align-items:center; justify-content:center; z-index:3; }
.photo-card.select-mode .check-mark { display:flex; background:transparent; border:2px solid #555; }
.photo-card.selected .check-mark { background:var(--accent); border:none; }
.photo-card.select-mode .tag-badge { display:none; }

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes rippleOut {
  0% { transform:translate(-50%,-50%) scale(0); opacity:0.6; }
  100% { transform:translate(-50%,-50%) scale(1); opacity:0; }
}
.ripple {
  position:fixed; border-radius:50%; pointer-events:none; z-index:85;
  background:radial-gradient(circle, var(--accent-66) 0%, var(--accent-22) 40%, transparent 70%);
  animation: rippleOut 0.5s ease-out forwards;
}

/* ── Lightbox ── */
.lightbox { display:none; position:fixed; inset:0; background:#000000ee; z-index:100; flex-direction:column; align-items:center; justify-content:center; }
.lightbox.open { display:flex; }
.lightbox .lb-img { width:90vw; height:70vh; display:flex; align-items:center; justify-content:center; font-size:120px; border-radius:8px; transition:transform 0.2s, opacity 0.2s; }
.lightbox .lb-nav { position:absolute; top:50%; transform:translateY(-50%); background:#ffffff22; border:none; color:#fff; width:40px; height:40px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.lightbox .lb-nav:active { background:#ffffff44; }
.lb-nav-prev { left:8px; }
.lb-nav-next { right:8px; }
.lb-counter { position:absolute; top:16px; left:50%; transform:translateX(-50%); font-size:13px; color:#aaa; }
.lightbox .lb-date { font-size:13px; color:#888; margin-top:12px; text-align:center; max-width:80vw; }
.lightbox .lb-tags { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
.lightbox .lb-tag { padding:4px 12px; border-radius:12px; font-size:12px; background:var(--accent-33); color:var(--accent); }
.lightbox .lb-close { position:absolute; top:16px; right:20px; background:none; border:none; color:#fff; font-size:32px; cursor:pointer; width:44px; height:44px; z-index:2; }
.lightbox .lb-actions { display:flex; gap:20px; margin-top:16px; }
.lightbox .lb-actions button { background:#1e1e2e; border:1px solid #333; color:#fff; border-radius:20px; padding:10px 20px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; }

/* ── FAB ── */
.fab { position:fixed; bottom:80px; right:24px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:#000; border:none; font-size:28px; cursor:pointer; box-shadow:0 4px 16px rgba(var(--accent-rgb),0.5); z-index:20; transition:transform 0.2s; }
.fab:active { transform:scale(0.9); }

/* ── Import/Stats Modal (bottom sheet) ── */
.modal-overlay { display:none; position:fixed; inset:0; background:#000000aa; z-index:90; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-sheet { background:#1a1a2e; border-radius:20px 20px 0 0; padding:24px 20px 32px; width:100%; max-width:480px; animation:slideUp 0.25s ease; max-height:85vh; overflow-y:auto; }
.modal-sheet::-webkit-scrollbar { width:3px; }
.modal-sheet::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-sheet h3 { font-size:17px; margin-bottom:16px; }
.modal-sheet .option { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid #222; cursor:pointer; font-size:15px; }
.modal-sheet .option:last-child { border:none; }
.modal-sheet .option .icon { font-size:24px; }
.modal-cancel { width:100%; padding:14px; margin-top:8px; background:#1e1e2e; border:none; color:#fff; border-radius:14px; font-size:15px; cursor:pointer; }

/* ── Stats Panel ── */
.stats-panel { padding:4px 0; }
.stat-card { background:#0f0f0f; border-radius:14px; padding:16px; margin-bottom:10px; }
.stat-card h4 { font-size:13px; color:#888; margin-bottom:12px; }
.stat-row { display:flex; gap:8px; }
.stat-item { flex:1; text-align:center; }
.stat-item .val { font-size:24px; font-weight:600; color:#fff; }
.stat-item .lbl { font-size:11px; color:#888; margin-top:2px; }
/* Mini bar chart */
.bar-chart { display:flex; align-items:flex-end; gap:6px; height:100px; padding-top:4px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.bar-fill { width:100%; border-radius:6px 6px 0 0; transition:height 0.5s ease; min-width:20px; }
.bar-label { font-size:10px; color:#888; }
/* Donut */
.donut-row { display:flex; align-items:center; gap:16px; }
.donut { width:80px; height:80px; border-radius:50%; position:relative; flex-shrink:0; }
.donut-legend { flex:1; }
.donut-legend .leg-item { display:flex; align-items:center; gap:6px; font-size:11px; margin-bottom:4px; }
.donut-legend .leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
/* Trend line */
.trend-bar { display:flex; align-items:flex-end; gap:3px; height:60px; }
.trend-bar .tb { flex:1; background:var(--accent); border-radius:2px 2px 0 0; transition:height 0.5s ease; }

/* ── Bottom Nav ── */
.bottom-nav { display:flex; justify-content:space-around; padding:6px 0 4px; background:#1a1a2e; border-top:1px solid #222; z-index:10; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; color:#888; font-size:11px; background:none; border:none; cursor:pointer; padding:4px 12px; transition:color 0.2s; }
.nav-item.active { color:var(--accent); }
.nav-item svg { width:22px; height:22px; }

/* ── Timeline View ── */
.timeline-view { display:none; flex:1; overflow-y:auto; padding:16px; }
.timeline-view.active { display:block; }
.timeline-group { margin-bottom:20px; }
.timeline-label { font-size:14px; color:var(--accent); font-weight:500; margin-bottom:8px; position:sticky; top:0; background:#0f0f0f; padding:8px 0; z-index:2; }
.timeline-row { display:flex; gap:3px; flex-wrap:wrap; }
.timeline-row .photo-card { width:calc(33.33% - 2px); aspect-ratio:1; }

/* ── Category View ── */
.category-view { display:none; flex:1; overflow-y:auto; padding:16px; }
.category-view.active { display:block; }
.cat-group { background:#1e1e2e; border-radius:12px; padding:16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; cursor:pointer; }
.cat-group .cat-icon { font-size:32px; }
.cat-group .cat-info { flex:1; }
.cat-group .cat-name { font-size:15px; font-weight:500; }
.cat-group .cat-count { font-size:12px; color:#888; }

/* ── Map View ── */
.map-view { display:none; flex:1; overflow:hidden; position:relative; background:#0a0a14; }
.map-view.active { display:block; }
.map-canvas { width:100%; height:100%; position:relative; background:radial-gradient(ellipse at 55% 45%, #1a1a3a 0%, #0a0a14 100%); overflow:hidden; }
.map-bg-dots { position:absolute; inset:0; background-image: radial-gradient(#222 1px, transparent 1px); background-size:28px 28px; }
.map-outline { position:absolute; inset:0; opacity:0.15; border:1px solid #334; border-radius:10% 40% 30% 20% / 30% 20% 40% 30%; transform:rotate(-5deg) scale(0.7,0.8); left:10%; top:5%; width:75%; height:85%; }
.map-marker { position:absolute; width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; transition:transform 0.2s; z-index:2; box-shadow:0 0 12px rgba(var(--accent-rgb),0.6); transform:translate(-50%,-50%); }
.map-marker:active { transform:translate(-50%,-50%) scale(1.3); z-index:5; }
.map-marker .marker-count { position:absolute; top:-8px; right:-8px; background:#ff6b6b; color:#fff; font-size:9px; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; }
.map-label { position:absolute; color:#ccc; font-size:11px; transform:translate(-50%,18px); pointer-events:none; white-space:nowrap; text-shadow:0 1px 4px #000; }
.map-legend { position:absolute; bottom:12px; left:12px; background:#1a1a2eee; border-radius:10px; padding:10px 14px; font-size:11px; color:#888; display:flex; gap:14px; }
.map-legend span { display:flex; align-items:center; gap:4px; }
.map-legend .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.map-legend .dot.purple { background:var(--accent); }
.map-legend .dot.red { background:#ff6b6b; }

/* ── AI Scan Overlay ── */
.ai-overlay { display:none; position:fixed; inset:0; background:#0f0f0ff8; z-index:150; flex-direction:column; align-items:center; justify-content:center; }
.ai-overlay.open { display:flex; }
.ai-progress-ring { width:140px; height:140px; position:relative; margin-bottom:24px; }
.ai-ring-bg { width:100%; height:100%; border-radius:50%; border:3px solid #222; position:absolute; }
.ai-ring-fill { width:100%; height:100%; border-radius:50%; border:3px solid var(--accent); border-top-color:transparent; position:absolute; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ai-ring-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:600; color:var(--accent); }
.ai-status { font-size:16px; color:#aaa; margin-bottom:6px; text-align:center; min-height:24px; }
.ai-substatus { font-size:12px; color:#666; text-align:center; }
.ai-log { margin-top:20px; max-height:180px; overflow-y:auto; width:80%; max-width:360px; font-family:'Consolas','Courier New',monospace; font-size:11px; color:#555; }
.ai-log .log-line { padding:3px 0; border-bottom:1px solid #111; animation: fadeIn 0.2s ease; }
.ai-log .log-line.tag { color:var(--accent); }
.ai-log .log-line.done { color:#4caf50; }
.ai-close-btn { margin-top:24px; background:#1e1e2e; border:1px solid #333; color:#fff; padding:10px 28px; border-radius:20px; cursor:pointer; font-size:14px; display:none; }

/* ── Dedup Overlay ── */
.dedup-overlay { display:none; position:fixed; inset:0; background:#0f0f0ff8; z-index:150; flex-direction:column; align-items:center; }
.dedup-overlay.open { display:flex; }
.dedup-header { padding:20px 16px; text-align:center; width:100%; }
.dedup-header h3 { font-size:18px; margin-bottom:4px; }
.dedup-header p { font-size:12px; color:#888; }
.dedup-progress-bar { width:80%; max-width:360px; height:6px; background:#1e1e2e; border-radius:3px; margin:12px 0; }
.dedup-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#ff6b6b); border-radius:3px; width:0%; transition:width 0.3s; }
.dedup-phase { font-size:13px; color:#aaa; margin-bottom:4px; }
.dedup-scan-box { width:80%; max-width:360px; height:120px; background:#1a1a2e; border-radius:12px; overflow:hidden; position:relative; margin:8px 0; }
.dedup-scan-line { position:absolute; left:0; right:0; height:2px; background:var(--accent-88); top:-2px; animation: scanDown 2s ease-in-out infinite; box-shadow:0 0 20px var(--accent-44); }
@keyframes scanDown { 0% { top:-2px; } 50% { top:100%; } 100% { top:-2px; } }
.dedup-scan-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:2px; padding:8px; height:100%; }
.dedup-scan-grid .mini { background:#2a2a3a; border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:18px; opacity:0.5; }
.dedup-results { flex:1; overflow-y:auto; width:90%; max-width:400px; padding:12px 0; display:none; }
.dedup-result-card { background:#1a1a2e; border-radius:12px; padding:14px; margin-bottom:8px; display:flex; gap:12px; align-items:center; }
.dedup-result-card .pair { display:flex; gap:8px; align-items:center; flex:1; }
.dedup-result-card .dup-img { width:56px; height:56px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:28px; }
.dedup-result-card .dup-info { flex:1; font-size:12px; }
.dedup-result-card .dup-sim { background:#ff6b6b22; color:#ff6b6b; font-size:11px; padding:4px 8px; border-radius:10px; }
.dedup-close-btn { background:#1e1e2e; border:1px solid #333; color:#fff; padding:10px 28px; border-radius:20px; cursor:pointer; font-size:14px; margin:16px 0 32px; display:none; }
.dedup-summary { font-size:14px; text-align:center; padding:8px; display:none; }
.dedup-summary .found { color:#ff6b6b; font-size:24px; font-weight:600; }

/* ── Empty State ── */
.empty-state { display:none; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:#888; text-align:center; }
.empty-state .empty-icon { font-size:64px; margin-bottom:12px; }
.empty-state .empty-text { font-size:15px; }

/* ── Toast ── */
.toast { position:fixed; bottom:140px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:10px 24px; border-radius:20px; font-size:14px; z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.toast.show { opacity:1; }

/* ── Favorite ── */
.photo-card .fav-badge { display:none; position:absolute; top:4px; right:4px; font-size:14px; z-index:2; filter:drop-shadow(0 1px 2px #000); }
.photo-card.is-fav .fav-badge { display:block; }
.lb-heart { background:none; border:none; font-size:24px; cursor:pointer; transition:transform 0.2s; padding:4px; }
.lb-heart:active { transform:scale(1.3); }
.lb-heart.faved { animation: heartBump 0.3s ease; }
@keyframes heartBump { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

/* ── EXIF Card ── */
.exif-card { display:none; background:#1a1a2e; border-radius:16px; padding:16px; max-width:80vw; margin-top:12px; }
.exif-card.show { display:block; }
.exif-card .exif-row { display:grid; grid-template-columns:repeat(2,1fr); gap:6px 16px; font-size:11px; }
.exif-card .exif-item { display:flex; justify-content:space-between; color:#888; }
.exif-card .exif-item span:last-child { color:#ccc; }
.exif-card .exif-title { font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:500; }

/* ── Settings ── */
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid #222; }
.setting-row:last-child { border:none; }
.setting-row .s-label { font-size:14px; }
.setting-row .s-desc { font-size:11px; color:#888; margin-top:2px; }
.setting-toggle { width:48px; height:28px; border-radius:14px; background:#333; position:relative; cursor:pointer; transition:background 0.2s; border:none; }
.setting-toggle.on { background:var(--accent); }
.setting-toggle::after { content:''; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:transform 0.2s; }
.setting-toggle.on::after { transform:translateX(20px); }
.setting-action { color:var(--accent); font-size:14px; cursor:pointer; background:none; border:none; }
.setting-danger { color:#ff6b6b !important; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <svg width="26" height="26" viewBox="0 0 24 24" class="logo-icon">
    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-width="1.5" fill="none"/>
  </svg>
  <div class="header-actions">
    <button class="header-btn" id="btnAiTag" title="AI 智能分类">🤖 AI分类</button>
    <button class="header-btn" id="btnDedup" title="去重扫描">🔍 去重</button>
    <button class="header-btn" id="btnStats" title="统计面板">📊 统计</button>
    <button class="header-btn" id="btnTheme" title="切换主题">🎨</button>
    <button class="header-btn" id="btnSettings" title="设置">⚙️</button>
  </div>
  <span class="badge">iCloud Drive</span>
</div>

<!-- Select Mode Bar -->
<div class="select-bar" id="selectBar">
  <span class="sel-count" id="selCount">已选 0 张</span>
  <button id="selShare">📤 分享</button>
  <button id="selDelete">🗑 删除</button>
  <button class="sel-cancel" id="selCancel">取消</button>
</div>

<!-- Tabs -->
<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all">全部</button>
  <button class="tab" data-cat="portrait">人物</button>
  <button class="tab" data-cat="landscape">风景</button>
  <button class="tab" data-cat="document">文档</button>
  <button class="tab" data-cat="pet">宠物</button>
  <button class="tab" data-cat="food">食物</button>
  <button class="tab" data-cat="other">其他</button>

<script>
// ═══════════════════════════════════
// Mock Data
// ═══════════════════════════════════
const emojis = ['🌅','🏔️','🌊','🐱','🍜','📱','🎨','🌸','🏠','✈️','🎂','⚽','🎭','🌵','🎸','🍣','🐕','📚','🚗','🌈','☕','🏖️','🌻','🐦','🍕','🖼️','🎮','🎪','🌉','🏯','🍰','🐠','🎄','🏜️','🦋','🎵'];
const colors = ['#2a2a3a','#2d2a3a','#2a2d3a','#2a3a2d','#3a2a2a','#2a3a3a','#3a2a3a','#3a3a2a'];
const categories = ['portrait','landscape','document','pet','food','portrait','landscape','food','pet','landscape','food','other','portrait','landscape','food','other','pet','document','other','pet'];

const locations = [
  { name:'杭州·西湖', x:72, y:55 },
  { name:'北京·故宫', x:67, y:28 },
  { name:'上海·外滩', x:76, y:52 },
  { name:'成都·宽窄巷子', x:38, y:52 },
  { name:'大理·洱海', x:30, y:68 },
  { name:'三亚·海滩', x:32, y:88 },
  { name:'西安·城墙', x:52, y:38 },
  { name:'拉萨·布达拉宫', x:10, y:50 },
  { name:'桂林·漓江', x:48, y:74 },
  { name:'厦门·鼓浪屿', x:64, y:72 },
];

let photos = [];
const totalPhotos = 36;

for (let i = 0; i < totalPhotos; i++) {
  const cat = categories[i % categories.length];
  const loc = locations[i % locations.length];
  const month = 10 + Math.floor(i / 4);
  const day = String((i % 28) + 1).padStart(2,'0');
  const year = month > 12 ? '2026' : (month < 10 ? '2024' : '2025');
  const m = String(month > 12 ? month - 12 : month).padStart(2,'0');
  photos.push({
    id: i,
    emoji: emojis[i % emojis.length],
    category: cat,
    color: colors[i % colors.length],
    date: `${year}-${m}-${day}`,
    time: `${String(8 + i % 14).padStart(2,'0')}:${String((i * 7) % 60).padStart(2,'0')}`,
    tags: getTags(cat),
    aiTags: null,
    filename: `IMG_${String(4528 + i).padStart(4,'0')}.HEIC`,
    size: `${(2.3 + (i * 0.7) % 8).toFixed(1)} MB`,
    location: loc.name,
    locX: loc.x,
    locY: loc.y,
    isDuplicate: false,
    duplicateOf: null,
    isFavorite: (i % 7 === 0 || i % 11 === 0),
    exif: {
      camera: ['iPhone 15 Pro','iPhone 14 Pro','Canon EOS R5','Sony A7M4','DJI Mini 3'][i % 5],
      lens: ['24mm f/1.8','50mm f/1.4','70-200mm f/2.8','16mm f/2.8','85mm f/1.2'][i % 5],
      aperture: ['f/1.8','f/2.8','f/4.0','f/5.6','f/11'][i % 5],
      shutter: ['1/120','1/250','1/500','1/1000','1/60'][i % 5],
      iso: String([100,200,400,800,1600][i % 5]),
      focal: ['24mm','35mm','50mm','85mm','200mm'][i % 5],
      gps: `${(30+Math.random()*10).toFixed(3)}, ${(110+Math.random()*10).toFixed(3)}`,
      resolution: '4032x3024',
      flash: i%3===0?'关闭':'自动'
    }
  });
}

function getTags(cat) {
  const map = {
    portrait: ['人物','自拍','合影'], landscape: ['风景','户外','自然'],
    document: ['文档','截图','文字'], pet: ['宠物','猫咪','狗狗'],
    food: ['食物','美食','餐厅'], other: ['截图','其他','素材']
  };
  return map[cat] || ['未分类'];
}

// ═══════════════════════════════════
// State
// ═══════════════════════════════════
let activeTab = 'all';
let activeView = 'grid';
let searchQuery = '';
let aiTaggedCount = 0;
let selectedPhotos = new Set();
let selectMode = false;
let currentLightboxIndex = -1;
let currentLightboxList = [];

// ═══════════════════════════════════
// DOM refs
// ═══════════════════════════════════
const grid = document.getElementById('grid');
const timelineView = document.getElementById('timelineView');
const categoryView = document.getElementById('categoryView');
const mapView = document.getElementById('mapView');
const mapCanvas = document.getElementById('mapCanvas');
const emptyState = document.getElementById('emptyState');
const visibleCount = document.getElementById('visibleCount');
const aiTaggedCountEl = document.getElementById('aiTaggedCount');
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
const semanticChips = document.getElementById('semanticChips');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbDate = document.getElementById('lbDate');
const lbTags = document.getElementById('lbTags');
const lbCounter = document.getElementById('lbCounter');
const lbPrev = document.getElementById('lbPrev');
const lbNext = document.getElementById('lbNext');
const toast = document.getElementById('toast');
const importModal = document.getElementById('importModal');
const statsModal = document.getElementById('statsModal');
const statsPanel = document.getElementById('statsPanel');
const aiOverlay = document.getElementById('aiOverlay');
const dedupOverlay = document.getElementById('dedupOverlay');
const selectBar = document.getElementById('selectBar');
const selCount = document.getElementById('selCount');

// ═══════════════════════════════════
// Semantic Search Engine
// ═══════════════════════════════════
const semanticDB = {
  timeMap: {
    '去年': '2025', '前年': '2024', '今年': '2026',
    '春天': '-0[3-5]', '夏天': '-0[6-8]', '秋天': '-0[9-11]', '冬天': '-[12]|-0[1-2]',
    '一月': '-01', '二月': '-02', '三月': '-03', '四月': '-04', '五月': '-05', '六月': '-06',
    '七月': '-07', '八月': '-08', '九月': '-09', '十月': '-10', '十一月': '-11', '十二月': '-12',
    '春节': '', '国庆': '-10', '圣诞': '-12',
  },
  locationMap: {
    '海边': ['海滩','三亚','厦门','鼓浪屿','洱海','西湖'],
    '山上': ['山脉','拉萨','布达拉宫','长城','城墙','黄山'],
    '古城': ['故宫','城墙','宽窄巷子','西安','北京','成都'],
    '南方': ['三亚','桂林','厦门','大理','杭州','上海'],
  },
  contentMap: {
    '猫咪': ['猫','宠物','喵'], '狗': ['狗','宠物','犬'],
    '美食': ['食物','美食','餐厅','日料','寿司','披萨','蛋糕'],
    '风景': ['风景','自然','山脉','日落','云海','户外'],
    '自拍': ['人物','自拍','合影','人脸','微笑'],
    '文档': ['文档','截图','文字','表格','PDF'],
    '日落': ['日落','黄金时刻','傍晚','夕阳'],
    '花': ['花','樱花','春天','户外'],
  }
};

function parseSemanticQuery(query) {
  if (!query || query.length < 2) return { chips:[], filters:{} };
  const chips = [];
  const filters = { timePattern:null, locKeywords:[], contentKeywords:[], raw:query };

  // Time parsing
  for (const [keyword, pattern] of Object.entries(semanticDB.timeMap)) {
    if (query.includes(keyword)) {
      chips.push({ type:'time', text:'🕐 '+keyword, detail:pattern });
      filters.timePattern = pattern;
      break;
    }
  }

  // Location parsing
  for (const [keyword, related] of Object.entries(semanticDB.locationMap)) {
    if (query.includes(keyword)) {
      chips.push({ type:'location', text:'📍 '+keyword, detail:related.join('/') });
      filters.locKeywords = related;
      break;
    }
  }
  // Direct location mentions
  if (!filters.locKeywords) {
    const allLocs = locations.map(l=>l.name.split('·')[1]);
    const direct = allLocs.filter(l => query.includes(l));
    if (direct.length > 0) {
      chips.push({ type:'location', text:'📍 '+direct.join(', '), detail:direct.join('/') });
      filters.locKeywords = direct;
    }
  }

  // Content parsing
  for (const [keyword, related] of Object.entries(semanticDB.contentMap)) {
    if (query.includes(keyword)) {
      chips.push({ type:'content', text:'🏷 '+keyword, detail:related.join('/') });
      filters.contentKeywords = related;
      break;
    }
  }

  // If no structured keywords found but text exists, treat as fuzzy content search
  if (chips.length === 0 && query.length >= 2) {
    chips.push({ type:'action', text:'🔍 智能匹配: '+query, detail:'全字段模糊搜索' });
    filters.contentKeywords = [query];
  }

  return { chips, filters };
}

function matchSemantic(photo, filters) {
  if (!filters.raw) return true;

  // Time filter
  if (filters.timePattern) {
    const pattern = filters.timePattern;
    if (pattern.match(/^\d{4}$/)) {
      if (!photo.date.startsWith(pattern)) return false;
    } else if (pattern.includes('-')) {
      // Month pattern — simplified: check if date contains month
      const monthPart = pattern.replace(/[\[\]\-|]/g,'').replace(/0/g,'');
      const photoMonth = photo.date.substring(5, 7);
      if (!pattern.includes(photoMonth) && !pattern.includes('0'+parseInt(photoMonth))) {
        // Soft match: don't exclude, just deprioritize handled by order
      }
    }
  }

  // Location filter
  if (filters.locKeywords && filters.locKeywords.length > 0) {
    const matchesLoc = filters.locKeywords.some(kw =>
      photo.location.toLowerCase().includes(kw.toLowerCase())
    );
    if (!matchesLoc) return false;
  }

  // Content filter
  if (filters.contentKeywords && filters.contentKeywords.length > 0) {
    const allTags = [...photo.tags, ...(photo.aiTags || [])];
    const matchesContent = filters.contentKeywords.some(kw =>
      allTags.some(t => t.toLowerCase().includes(kw.toLowerCase())) ||
      photo.category.toLowerCase().includes(kw.toLowerCase())
    );
    if (!matchesContent) return false;
  }

  return true;
}

function renderSemanticChips(chips) {
  semanticChips.innerHTML = '<span class="sem-ai-badge">🤖 AI 理解了你的搜索：</span>';
  if (chips.length === 0) {
    semanticChips.classList.remove('show');
    return;
  }
  chips.forEach(c => {
    const span = document.createElement('span');
    span.className = 'sem-chip '+c.type;
    span.textContent = c.text;
    semanticChips.appendChild(span);
  });
  semanticChips.classList.add('show');
}

// ═══════════════════════════════════
// Filter
// ═══════════════════════════════════
let semanticFilters = null;

function filterPhotos() {
  return photos.filter(p => {
    if (activeTab === 'favorites') return p.isFavorite;
    if (activeTab !== 'all' && p.category !== activeTab) return false;

    // Semantic search
    if (semanticFilters && semanticFilters.raw) {
      if (!matchSemantic(p, semanticFilters)) return false;
      return true;
    }

    // Plain text search (fallback)
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const allTags = [...p.tags, ...(p.aiTags || [])];
      const matchTags = allTags.some(t => t.toLowerCase().includes(q));
      const matchLocation = p.location.toLowerCase().includes(q);
      const matchDate = p.date.includes(q);
      const matchFile = p.filename.toLowerCase().includes(q);
      if (!matchTags && !matchLocation && !matchDate && !matchFile) return false;
    }
    return true;
  });
}

// ═══════════════════════════════════
// Render Grid
// ═══════════════════════════════════
function renderGrid() {
  const filtered = filterPhotos();
  visibleCount.textContent = filtered.length.toLocaleString();
  aiTaggedCountEl.textContent = aiTaggedCount;
  grid.innerHTML = '';
  emptyState.style.display = 'none';

  if (filtered.length === 0) {
    emptyState.style.display = 'flex';
    grid.style.display = 'none';
  } else {
    grid.style.display = 'grid';
    filtered.forEach((p, idx) => {
      const card = document.createElement('div');
      card.className = 'photo-card' + (p.aiTags ? ' ai-tagged' : '') + (selectMode ? ' select-mode' : '') + (p.isFavorite ? ' is-fav' : '');
      if (p.isDuplicate) card.style.border = '2px solid #ff6b6b';
      if (selectedPhotos.has(p.id)) card.classList.add('selected');
      card.style.background = p.color;
      card.style.animationDelay = `${idx * 0.02}s`;
      card.innerHTML = `
        <div class="ai-dot"></div>
        <div class="check-mark">✓</div>
        <span class="fav-badge">❤️</span>
        <span class="emoji">${p.emoji}</span>
        <span class="tag-badge">${p.aiTags ? p.aiTags[0] : p.tags[0]}</span>
      `;
      card.dataset.photoId = p.id;
      card.addEventListener('click', (e) => {
        if (selectMode) {
          toggleSelect(p.id, card);
        } else {
          openLightbox(p, filtered);
        }
      });
      // Long press for select mode
      let longPressTimer;
      card.addEventListener('pointerdown', (e) => {
        longPressTimer = setTimeout(() => enterSelectMode(p.id, card), 500);
      });
      card.addEventListener('pointerup', () => clearTimeout(longPressTimer));
      card.addEventListener('pointerleave', () => clearTimeout(longPressTimer));
      grid.appendChild(card);
    });
  }
}

// ═══════════════════════════════════
// Select Mode
// ═══════════════════════════════════
function enterSelectMode(firstId, cardEl) {
  // Ripple from the long-pressed card
  if (cardEl) {
    const rect = cardEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    // Size ripple to cover roughly the viewport diagonal from that point
    const toTopLeft = Math.sqrt(cx*cx + cy*cy);
    const toBotRight = Math.sqrt((window.innerWidth-cx)**2 + (window.innerHeight-cy)**2);
    const radius = Math.max(toTopLeft, toBotRight) * 2;

    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = cx + 'px';
    ripple.style.top = cy + 'px';
    ripple.style.width = radius + 'px';
    ripple.style.height = radius + 'px';
    document.body.appendChild(ripple);

    ripple.addEventListener('animationend', () => ripple.remove());
  }

  selectMode = true;
  selectedPhotos.clear();
  if (firstId !== undefined) selectedPhotos.add(firstId);
  updateSelectUI();
  renderGrid();
  showToast('已进入多选模式，点击照片选择');
}

function exitSelectMode() {
  selectMode = false;
  selectedPhotos.clear();
  updateSelectUI();
  renderGrid();
}

function toggleSelect(photoId, cardEl) {
  if (selectedPhotos.has(photoId)) {
    selectedPhotos.delete(photoId);
  } else {
    selectedPhotos.add(photoId);
  }
  if (selectedPhotos.size === 0) exitSelectMode();
  else updateSelectUI();
  // Update card visual
  const card = cardEl || grid.querySelector(`[data-photo-id="${photoId}"]`);
  if (card) card.classList.toggle('selected', selectedPhotos.has(photoId));
}

function updateSelectUI() {
  if (selectMode && selectedPhotos.size > 0) {
    selectBar.classList.add('show');
    selCount.textContent = `已选 ${selectedPhotos.size} 张`;
  } else if (selectedPhotos.size === 0) {
    selectBar.classList.remove('show');
    selectMode = false;
  }
}

document.getElementById('selCancel').addEventListener('click', exitSelectMode);
document.getElementById('selDelete').addEventListener('click', () => {
  const n = selectedPhotos.size;
  exitSelectMode();
  showToast(`🗑 已删除 ${n} 张照片`);
});
document.getElementById('selShare').addEventListener('click', () => {
  const n = selectedPhotos.size;
  exitSelectMode();
  showToast(`📤 已分享 ${n} 张照片`);
});

// ═══════════════════════════════════
// Render Timeline
// ═══════════════════════════════════
function renderTimeline() {
  const filtered = filterPhotos();
  const grouped = {};
  filtered.forEach(p => {
    const month = p.date.substring(0, 7);
    if (!grouped[month]) grouped[month] = [];
    grouped[month].push(p);
  });
  timelineView.innerHTML = '';
  const months = Object.keys(grouped).sort().reverse();
  months.forEach(month => {
    const group = document.createElement('div');
    group.className = 'timeline-group';
    const [y, m] = month.split('-');
    group.innerHTML = `<div class="timeline-label">${y}年${parseInt(m)}月</div><div class="timeline-row"></div>`;
    const row = group.querySelector('.timeline-row');
    grouped[month].forEach(p => {
      const card = document.createElement('div');
      card.className = 'photo-card' + (p.aiTags ? ' ai-tagged' : '');
      if (p.isDuplicate) card.style.border = '2px solid #ff6b6b';
      card.style.background = p.color;
      card.innerHTML = `<div class="ai-dot"></div><span class="emoji">${p.emoji}</span>`;
      card.addEventListener('click', () => {
        if (selectMode) toggleSelect(p.id, card);
        else openLightbox(p, filtered);
      });
      row.appendChild(card);
    });
    timelineView.appendChild(group);
  });
}

// ═══════════════════════════════════
// Render Category View
// ═══════════════════════════════════
function renderCategoryView() {
  const counts = {};
  photos.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
  const catMeta = {
    all: { icon:'🖼️', name:'全部照片' }, portrait: { icon:'👤', name:'人物' },
    landscape: { icon:'🏞️', name:'风景' }, document: { icon:'📄', name:'文档' },
    pet: { icon:'🐾', name:'宠物' }, food: { icon:'🍽️', name:'食物' }, other: { icon:'📦', name:'其他' }
  };
  categoryView.innerHTML = '';
  Object.entries(catMeta).forEach(([key, meta]) => {
    const count = key === 'all' ? photos.length : (counts[key] || 0);
    const aiCount = photos.filter(p => p.category === key && p.aiTags).length;
    const div = document.createElement('div');
    div.className = 'cat-group';
    div.innerHTML = `
      <span class="cat-icon">${meta.icon}</span>
      <div class="cat-info"><div class="cat-name">${meta.name}</div><div class="cat-count">${count} 张${aiCount > 0 ? ` · ${aiCount} 张 AI 已分类` : ''}</div></div>
      <span style="color:#555;">›</span>
    `;
    div.addEventListener('click', () => {
      activeTab = key;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === key));
      switchView('grid');
      renderGrid();
    });
    categoryView.appendChild(div);
  });
}

// ═══════════════════════════════════
// Render Map
// ═══════════════════════════════════
function renderMap() {
  const byLoc = {};
  photos.forEach(p => {
    const key = p.location;
    if (!byLoc[key]) byLoc[key] = { photos:[], locX:p.locX, locY:p.locY };
    byLoc[key].photos.push(p);
  });
  mapCanvas.querySelectorAll('.map-marker,.map-label').forEach(el => el.remove());
  Object.entries(byLoc).forEach(([name, data]) => {
    const marker = document.createElement('div');
    marker.className = 'map-marker';
    marker.style.left = data.locX + '%';
    marker.style.top = data.locY + '%';
    marker.innerHTML = data.photos[0].emoji;
    if (data.photos.length > 1) marker.innerHTML += `<span class="marker-count">${data.photos.length}</span>`;
    marker.addEventListener('click', () => {
      searchInput.value = name.split('·')[1] || name.split('·')[0];
      searchQuery = searchInput.value.trim();
      semanticFilters = null;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      semanticChips.classList.remove('show');
      switchView('grid');
      renderGrid();
      showToast(`📍 ${name} — ${data.photos.length} 张照片`);
    });
    mapCanvas.appendChild(marker);
    const label = document.createElement('div');
    label.className = 'map-label';
    label.style.left = data.locX + '%';
    label.style.top = data.locY + '%';
    label.textContent = name.split('·')[1] || name;
    mapCanvas.appendChild(label);
  });
}

// ═══════════════════════════════════
// View Switching
// ═══════════════════════════════════
function switchView(view) {
  activeView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  grid.style.display = view === 'grid' ? 'grid' : 'none';
  timelineView.classList.toggle('active', view === 'timeline');
  mapView.classList.toggle('active', view === 'map');
  categoryView.classList.toggle('active', view === 'category');
  emptyState.style.display = 'none';
  // Views are pre-rendered at init; only refresh on data change
}
function refreshActiveView() {
  if (activeView === 'grid') renderGrid();
  else if (activeView === 'timeline') renderTimeline();
}
function refreshAllViews() {
  renderGrid();
  renderTimeline();
  renderCategoryView();
  renderMap();
}

// ═══════════════════════════════════
// Lightbox with Swipe Navigation
// ═══════════════════════════════════
function openLightbox(photo, photoList) {
  currentLightboxList = photoList || filterPhotos();
  currentLightboxIndex = currentLightboxList.findIndex(p => p.id === photo.id);
  renderLightboxPhoto();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLightboxPhoto() {
  if (currentLightboxIndex < 0 || currentLightboxIndex >= currentLightboxList.length) return;
  const p = currentLightboxList[currentLightboxIndex];
  lbImg.textContent = p.emoji;
  lbImg.style.background = p.color;
  const d = new Date(p.date + 'T' + p.time);
  const allTags = [...p.tags, ...(p.aiTags || [])];
  lbDate.textContent = `${d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'})} ${p.time} · ${p.size} · ${p.location}`;
  if (p.isDuplicate) lbDate.textContent += ' · ⚠️ 疑似重复';
  lbTags.innerHTML = allTags.map(t => `<span class="lb-tag">${t}</span>`).join('');
  lbCounter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxList.length}`;
  lbPrev.style.display = currentLightboxIndex > 0 ? 'flex' : 'none';
  lbNext.style.display = currentLightboxIndex < currentLightboxList.length - 1 ? 'flex' : 'none';
  // Heart state
  const heartBtn = document.getElementById('lbHeart');
  heartBtn.textContent = p.isFavorite ? '❤️' : '🤍';
  heartBtn.classList.toggle('faved', p.isFavorite);
  // EXIF card
  const exifCard = document.getElementById('exifCard');
  const e = p.exif;
  exifCard.innerHTML = `
    <div class="exif-title">📋 照片信息</div>
    <div class="exif-row">
      <div class="exif-item"><span>相机</span><span>${e.camera}</span></div>
      <div class="exif-item"><span>镜头</span><span>${e.lens}</span></div>
      <div class="exif-item"><span>光圈</span><span>${e.aperture}</span></div>
      <div class="exif-item"><span>快门</span><span>${e.shutter}</span></div>
      <div class="exif-item"><span>ISO</span><span>${e.iso}</span></div>
      <div class="exif-item"><span>焦距</span><span>${e.focal}</span></div>
      <div class="exif-item"><span>GPS</span><span>${e.gps}</span></div>
      <div class="exif-item"><span>分辨率</span><span>${e.resolution}</span></div>
      <div class="exif-item"><span>闪光灯</span><span>${e.flash}</span></div>
      <div class="exif-item"><span>文件名</span><span>${p.filename}</span></div>
    </div>
  `;
  exifCard.classList.remove('show');
}

function lightboxNext() {
  if (currentLightboxIndex < currentLightboxList.length - 1) {
    currentLightboxIndex++;
    animateLightboxTransition('right');
    renderLightboxPhoto();
  }
}

function lightboxPrev() {
  if (currentLightboxIndex > 0) {
    currentLightboxIndex--;
    animateLightboxTransition('left');
    renderLightboxPhoto();
  }
}

function animateLightboxTransition(dir) {
  lbImg.style.transform = dir === 'right' ? 'translateX(-20px)' : 'translateX(20px)';
  lbImg.style.opacity = '0.5';
  setTimeout(() => {
    lbImg.style.transform = '';
    lbImg.style.opacity = '';
  }, 150);
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  currentLightboxIndex = -1;
  currentLightboxList = [];
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
lbPrev.addEventListener('click', e => { e.stopPropagation(); lightboxPrev(); });
lbNext.addEventListener('click', e => { e.stopPropagation(); lightboxNext(); });
document.getElementById('lbDelete').addEventListener('click', () => {
  showToast('已移至回收站');
  closeLightbox();
});
document.getElementById('lbHeart').addEventListener('click', (e) => {
  e.stopPropagation();
  const p = currentLightboxList[currentLightboxIndex];
  if (!p) return;
  p.isFavorite = !p.isFavorite;
  const heartBtn = document.getElementById('lbHeart');
  heartBtn.textContent = p.isFavorite ? '❤️' : '🤍';
  heartBtn.classList.toggle('faved', p.isFavorite);
  showToast(p.isFavorite ? '❤️ 已收藏' : '已取消收藏');
  renderGrid();
  renderTimeline();
});
document.getElementById('lbExif').addEventListener('click', (e) => {
  e.stopPropagation();
  const exifCard = document.getElementById('exifCard');
  exifCard.classList.toggle('show');
});

// Swipe gesture
let touchStartX = 0;
lbImg.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
lbImg.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) lightboxNext();
    else lightboxPrev();
  }
});

// Keyboard arrow navigation
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lightboxPrev();
  if (e.key === 'ArrowRight') lightboxNext();
});

// Search (with semantic engine)
// ═══════════════════════════════════
let semanticTimeout;
searchInput.addEventListener('input', () => {
  const raw = searchInput.value.trim();
  searchClear.style.display = raw ? 'block' : 'none';

  clearTimeout(semanticTimeout);
  semanticTimeout = setTimeout(() => {
    if (raw.length >= 2) {
      const { chips, filters } = parseSemanticQuery(raw);
      semanticFilters = filters;
      renderSemanticChips(chips);
    } else {
      semanticFilters = null;
      semanticChips.classList.remove('show');
    }
    searchQuery = raw; // keep for fallback
    if (activeView === 'grid') refreshActiveView();
    else if (activeView === 'timeline') refreshActiveView();
    else if (activeView === 'map') { switchView('grid'); refreshActiveView(); }
  }, 300);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  semanticFilters = null;
  searchClear.style.display = 'none';
  semanticChips.classList.remove('show');
  refreshActiveView();
});

  const untagged = photos.filter(p => !p.aiTags);
  if (untagged.length === 0) {
    photos.forEach(p => { p.aiTags = null; });
    aiTaggedCount = 0;
  }

  const toTag = photos.filter(p => !p.aiTags);
  let processed = 0;
  const total = toTag.length;

  aiStatus.textContent = `开始分析 ${total} 张照片...`;
  aiSubstatus.textContent = '使用多模态视觉理解 + OCR 文字提取';

  const aiPossibleTags = {
    portrait: ['人脸','微笑','合影','室外','自然光','半身像','旅行'],
    landscape: ['山脉','日落','云海','广角','黄金时刻','自然','远景'],
    document: ['文字','截图','表格','PDF','收据','合同','扫描件'],
    pet: ['猫咪','橘猫','室内','特写','宠物','毛茸茸','可爱'],
    food: ['美食','日料','餐厅','特写','摆盘','日式','晚餐'],
    other: ['截图','素材','UI','设计','参考','灵感','网络']
  };

  function processNext() {
    if (processed >= total) {
      aiTaggedCount = photos.filter(p => p.aiTags).length;
      aiStatus.textContent = `✅ 分类完成！`;
      aiSubstatus.textContent = `已处理 ${aiTaggedCount} 张，生成 ${aiTaggedCount * 3} 个标签`;
      aiPercent.textContent = '100%';
      aiCloseBtn.style.display = 'block';
      addAiLog(`✅ 全部完成: ${aiTaggedCount} 张照片已分类`, 'done');
      addAiLog(`📊 Token 消耗: ~${(aiTaggedCount * 5).toLocaleString()}K (MiMo-V2.5)`, '');
      addAiLog(`💰 预估成本: ¥${(aiTaggedCount * 0.015).toFixed(2)} (DeepSeek 定价)`, '');
      refreshAllViews();
      return;
    }

    const p = toTag[processed];
    const percent = Math.round(((processed + 1) / total) * 100);
    aiPercent.textContent = percent + '%';
    aiStatus.textContent = `分析中: ${p.filename}`;

    const pool = aiPossibleTags[p.category] || aiPossibleTags.other;
    const chosen = [];
    const used = new Set();
    while (chosen.length < 3) {
      const t = pool[Math.floor(Math.random() * pool.length)];
      if (!used.has(t)) { used.add(t); chosen.push(t); }
    }
    p.aiTags = chosen;

    addAiLog(`🖼️ ${p.filename} → ${chosen.join(', ')}`, 'tag');
    aiSubstatus.textContent = `${p.emoji} 检测到: ${chosen[0]}, ${chosen[1]}`;

    processed++;
    const delay = 150 + Math.random() * 400;
    if (processed === total) {
      setTimeout(processNext, delay);
    } else {
      setTimeout(processNext, delay);
    }
  }

  setTimeout(processNext, 600);
}

function addAiLog(msg, cls) {
  const line = document.createElement('div');
  line.className = 'log-line ' + (cls || '');
  line.textContent = msg;
  aiLog.appendChild(line);
  aiLog.scrollTop = aiLog.scrollHeight;
}

aiCloseBtn.addEventListener('click', () => {
  aiOverlay.classList.remove('open');
  document.body.style.overflow = '';
  refreshAllViews();
});

// ═══════════════════════════════════
// Dedup Scan
// ═══════════════════════════════════
const dedupPhase = document.getElementById('dedupPhase');
const dedupProgressFill = document.getElementById('dedupProgressFill');
const dedupScanGrid = document.getElementById('dedupScanGrid');
const dedupResults = document.getElementById('dedupResults');
const dedupSummary = document.getElementById('dedupSummary');
const dedupCloseBtn = document.getElementById('dedupCloseBtn');

document.getElementById('btnDedup').addEventListener('click', startDedup);

function startDedup() {
  photos.forEach(p => { p.isDuplicate = false; p.duplicateOf = null; });
  dedupOverlay.classList.add('open');
  dedupResults.innerHTML = '';
  dedupResults.style.display = 'none';
  dedupSummary.style.display = 'none';
  dedupCloseBtn.style.display = 'none';
  dedupProgressFill.style.width = '0%';
  document.body.style.overflow = 'hidden';

  dedupScanGrid.innerHTML = '';
  for (let i = 0; i < 24; i++) {
    const mini = document.createElement('div');
    mini.className = 'mini';
    mini.textContent = emojis[i % emojis.length];
    dedupScanGrid.appendChild(mini);
  }

  dedupPhase.textContent = '阶段 1/3: 计算 pHash 感知指纹...';
  setTimeout(() => {
    dedupProgressFill.style.width = '33%';
    dedupPhase.textContent = '阶段 2/3: 生成 CLIP 特征向量 (Embedding)...';
    setTimeout(() => {
      dedupProgressFill.style.width = '66%';
      dedupPhase.textContent = '阶段 3/3: 余弦相似度比对 630 对...';
      setTimeout(() => {
        dedupProgressFill.style.width = '100%';
        dedupPhase.textContent = '✅ 扫描完成';

        const dupPairs = [
          { a: photos[2], b: photos[20], sim: '97.3%' },
          { a: photos[7], b: photos[25], sim: '94.1%' },
          { a: photos[11], b: photos[29], sim: '91.8%' },
          { a: photos[4], b: photos[14], sim: '88.5%' },
        ];

        dupPairs.forEach(pair => {
          pair.a.isDuplicate = true;
          pair.a.duplicateOf = pair.b.id;
          pair.b.isDuplicate = true;
          pair.b.duplicateOf = pair.a.id;
        });

        const dupCount = new Set(dupPairs.flatMap(p => [p.a.id, p.b.id])).size;

        dedupSummary.innerHTML = `
          <div class="found">${dupPairs.length} 组重复</div>
          <div>涉及 ${dupCount} 张照片 · 可释放 ${(dupPairs.length * 4.7).toFixed(1)} MB</div>
        `;
        dedupSummary.style.display = 'block';

        dedupResults.innerHTML = '';
        dupPairs.forEach(pair => {
          const card = document.createElement('div');
          card.className = 'dedup-result-card';
          card.innerHTML = `
            <div class="pair">
              <div class="dup-img" style="background:${pair.a.color}">${pair.a.emoji}</div>
              <div class="dup-img" style="background:${pair.b.color}">${pair.b.emoji}</div>
            </div>
            <div class="dup-info">
              <div>${pair.a.filename}</div>
              <div>${pair.b.filename}</div>
              <div style="color:#888;font-size:11px;">${pair.a.location}</div>
            </div>
            <span class="dup-sim">${pair.sim}</span>
          `;
          dedupResults.appendChild(card);
        });
        dedupResults.style.display = 'block';
        dedupCloseBtn.style.display = 'block';
        refreshAllViews();
      }, 1200);
    }, 1000);
  }, 800);
}

dedupCloseBtn.addEventListener('click', () => {
  dedupOverlay.classList.remove('open');
  document.body.style.overflow = '';
});

// ═══════════════════════════════════
// Keyboard
// ═══════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    importModal.classList.remove('open');
    statsModal.classList.remove('open');
    settingsModal.classList.remove('open');
    exitSelectMode();
    if (aiOverlay.classList.contains('open') && aiCloseBtn.style.display !== 'none') {
      aiOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    if (dedupOverlay.classList.contains('open') && dedupCloseBtn.style.display !== 'none') {
      dedupOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }
  }
});

// ═══════════════════════════════════
// Init
// ═══════════════════════════════════
renderGrid();
renderTimeline();
renderCategoryView();
renderMap();
</script>
